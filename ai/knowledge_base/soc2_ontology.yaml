# SOC-2 Trust Services Criteria Domain Ontology
# Used to augment extraction prompts with domain context

trust_services_categories:
  CC:
    name: "Common Criteria (Security)"
    description: "Controls related to security — the foundation of all other categories"

  A:
    name: "Availability"
    description: "Controls related to system availability commitments"

  PI:
    name: "Processing Integrity"
    description: "Controls related to completeness, accuracy, and timeliness of processing"

  C:
    name: "Confidentiality"
    description: "Controls related to information designated as confidential"

  P:
    name: "Privacy"
    description: "Controls related to personal information collection, use, retention, and disposal"

trust_services_criteria:
  CC1.1:
    category: "Control Environment"
    definition: "The entity demonstrates a commitment to integrity and ethical values"
    risk_implication: "Failure indicates weak corporate governance"
    affected_coverages: ["d_and_o", "epli"]
    risk_weight: 0.4

  CC1.2:
    category: "Control Environment"
    definition: "The board of directors demonstrates independence from management and oversight of internal controls"
    risk_implication: "Weak board oversight increases D&O exposure"
    affected_coverages: ["d_and_o"]
    risk_weight: 0.3

  CC2.1:
    category: "Communication and Information"
    definition: "The entity obtains or generates and uses relevant, quality information to support internal control"
    risk_implication: "Poor information quality affects decision-making and reporting"
    affected_coverages: ["d_and_o", "tech_eo"]
    risk_weight: 0.3

  CC3.1:
    category: "Risk Assessment"
    definition: "The entity specifies objectives with sufficient clarity to enable identification and assessment of risks"
    risk_implication: "Unclear risk objectives indicate immature risk management"
    affected_coverages: ["cyber", "tech_eo"]
    risk_weight: 0.4

  CC5.1:
    category: "Control Activities"
    definition: "The entity selects and develops control activities that contribute to mitigation of risks"
    risk_implication: "Inadequate controls increase all risk categories"
    affected_coverages: ["cyber", "tech_eo", "gl"]
    risk_weight: 0.5

  CC6.1:
    category: "Logical and Physical Access Controls"
    definition: "The entity implements logical access security software, infrastructure, and architectures over protected information assets"
    risk_implication: "Access control weakness is the #1 cyber insurance risk factor"
    affected_coverages: ["cyber"]
    risk_weight: 0.9

  CC6.2:
    category: "Logical and Physical Access Controls"
    definition: "Prior to issuing system credentials, the entity registers and authorizes new internal and external users"
    risk_implication: "Weak user provisioning increases unauthorized access risk"
    affected_coverages: ["cyber"]
    risk_weight: 0.7

  CC6.3:
    category: "Logical and Physical Access Controls"
    definition: "The entity authorizes, modifies, or removes access based on job function and role"
    risk_implication: "Lack of role-based access indicates flat permission model"
    affected_coverages: ["cyber"]
    risk_weight: 0.6

  CC6.6:
    category: "Logical and Physical Access Controls"
    definition: "The entity implements logical access security measures to protect against threats from outside system boundaries"
    risk_implication: "Weak perimeter security — firewall, WAF, DDoS protection gaps"
    affected_coverages: ["cyber"]
    risk_weight: 0.8

  CC6.8:
    category: "Logical and Physical Access Controls"
    definition: "The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software"
    risk_implication: "No malware protection increases breach probability"
    affected_coverages: ["cyber"]
    risk_weight: 0.7

  CC7.1:
    category: "System Operations"
    definition: "To meet its objectives, the entity uses detection and monitoring procedures to identify changes to configurations that result in new vulnerabilities"
    risk_implication: "No vulnerability management program"
    affected_coverages: ["cyber", "tech_eo"]
    risk_weight: 0.7

  CC7.2:
    category: "System Operations"
    definition: "The entity monitors system components and the operation of those components for anomalies indicative of malicious acts, natural disasters, and errors"
    risk_implication: "No intrusion detection or SIEM — cannot detect breaches"
    affected_coverages: ["cyber"]
    risk_weight: 0.8

  CC7.3:
    category: "System Operations"
    definition: "The entity evaluates security events to determine whether they could or have resulted in a failure to meet objectives"
    risk_implication: "No incident triage process — breaches may go undetected"
    affected_coverages: ["cyber"]
    risk_weight: 0.7

  CC7.4:
    category: "System Operations"
    definition: "The entity responds to identified security incidents by executing a defined incident response program"
    risk_implication: "No incident response plan — critical for cyber insurance"
    affected_coverages: ["cyber", "tech_eo"]
    risk_weight: 0.9

  CC8.1:
    category: "Change Management"
    definition: "The entity authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures"
    risk_implication: "Poor change management increases production incidents"
    affected_coverages: ["tech_eo"]
    risk_weight: 0.5

  CC9.1:
    category: "Risk Mitigation"
    definition: "The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions"
    risk_implication: "No business continuity planning"
    affected_coverages: ["cyber", "tech_eo", "gl"]
    risk_weight: 0.6

audit_finding_types:
  exception:
    definition: "A control that was tested and did not operate effectively during the audit period"
    severity: "high"
    risk_impact: "Direct premium increase on affected coverages"
    auto_bind_eligible: false

  qualified_opinion:
    definition: "Auditor found material issues — the system does not meet one or more trust services criteria"
    severity: "critical"
    risk_impact: "May trigger decline or mandatory senior underwriter review"
    auto_bind_eligible: false

  unqualified_opinion:
    definition: "Clean audit — system meets all stated trust services criteria"
    severity: "none"
    risk_impact: "Positive signal — reduces cyber and tech E&O premiums"
    auto_bind_eligible: true

  material_weakness:
    definition: "A deficiency so severe that there is a reasonable possibility of material misstatement not being prevented or detected"
    severity: "critical"
    risk_impact: "Blocks auto-bind. Requires senior underwriter and possibly reinsurance review."
    auto_bind_eligible: false

  compensating_control:
    definition: "An alternative control that partially mitigates a failed primary control"
    severity: "medium"
    risk_impact: "Reduces but does not eliminate the risk. Adjusts premium by 50% of original impact."
    auto_bind_eligible: true

security_signals:
  mfa:
    positive_indicators: ["multi-factor authentication", "MFA required", "two-factor", "2FA enforced", "MFA enabled for all users"]
    negative_indicators: ["single-factor", "MFA not required", "password-only", "MFA optional"]
    risk_field: "mfa_enforced"
    risk_impact_if_absent: 15
    affected_coverages: ["cyber"]

  encryption_at_rest:
    positive_indicators: ["AES-256", "encrypted at rest", "disk encryption", "TDE enabled", "encrypted storage"]
    negative_indicators: ["unencrypted", "plaintext storage", "no encryption at rest"]
    risk_field: "encryption_at_rest"
    risk_impact_if_absent: 20
    affected_coverages: ["cyber"]

  encryption_in_transit:
    positive_indicators: ["TLS 1.2", "TLS 1.3", "HTTPS enforced", "encrypted in transit", "SSL"]
    negative_indicators: ["unencrypted connections", "HTTP allowed", "no transport encryption"]
    risk_field: "encryption_in_transit"
    risk_impact_if_absent: 15
    affected_coverages: ["cyber"]

  incident_response:
    positive_indicators: ["incident response plan", "IRP", "breach notification procedure", "security incident playbook", "CSIRT"]
    negative_indicators: ["no formal incident response", "ad hoc incident handling"]
    risk_field: "has_incident_response"
    risk_impact_if_absent: 10
    affected_coverages: ["cyber", "tech_eo"]

  penetration_testing:
    positive_indicators: ["annual penetration test", "third-party pen test", "external vulnerability assessment"]
    negative_indicators: ["no penetration testing", "testing not performed"]
    risk_field: "has_pen_testing"
    risk_impact_if_absent: 10
    affected_coverages: ["cyber"]

  backup_recovery:
    positive_indicators: ["regular backups", "disaster recovery plan", "RTO defined", "RPO defined", "backup testing"]
    negative_indicators: ["no backup procedures", "backups not tested"]
    risk_field: "has_backup_recovery"
    risk_impact_if_absent: 10
    affected_coverages: ["cyber", "tech_eo"]

  access_reviews:
    positive_indicators: ["quarterly access review", "periodic access recertification", "access audit"]
    negative_indicators: ["no access reviews", "access not regularly reviewed"]
    risk_field: "has_access_reviews"
    risk_impact_if_absent: 10
    affected_coverages: ["cyber"]
