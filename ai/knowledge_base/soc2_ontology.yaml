# SOC-2 Trust Services Criteria Domain Ontology
# Used to augment extraction prompts with domain context

trust_services_categories:
  CC:
    name: "Common Criteria (Security)"
    description: "Controls related to security -- the foundation of all other categories"
  A:
    name: "Availability"
    description: "Controls related to system availability commitments"
  PI:
    name: "Processing Integrity"
    description: "Controls related to completeness, accuracy, and timeliness of processing"
  C:
    name: "Confidentiality"
    description: "Controls related to information designated as confidential"
  P:
    name: "Privacy"
    description: "Controls related to personal information collection, use, retention, and disposal"

trust_services_criteria:
  CC1.1:
    category: "Control Environment"
    definition: "The entity demonstrates a commitment to integrity and ethical values"
    risk_implication: "Failure indicates weak corporate governance"
    affected_coverages: ["d_and_o", "epli"]
    risk_weight: 0.4
    justification: "Tone-at-the-top failures correlate with 2.5x higher fraud incidence per ACFE Report to the Nations 2024. Moderate weight because indirect risk."

  CC1.2:
    category: "Control Environment"
    definition: "The board of directors demonstrates independence from management and oversight of internal controls"
    risk_implication: "Weak board oversight increases D&O exposure"
    affected_coverages: ["d_and_o"]
    risk_weight: 0.3
    justification: "Board independence failures account for 18% of D&O claims per Chubb D&O Liability Report. Lower weight because most startups have informal boards."

  CC2.1:
    category: "Communication and Information"
    definition: "The entity obtains or generates and uses relevant, quality information to support internal control"
    risk_implication: "Poor information quality affects decision-making and reporting"
    affected_coverages: ["d_and_o", "tech_eo"]
    risk_weight: 0.3
    justification: "Information quality issues rarely lead to direct claims but amplify other control failures. Low baseline weight."

  CC3.1:
    category: "Risk Assessment"
    definition: "The entity specifies objectives with sufficient clarity to enable identification and assessment of risks"
    risk_implication: "Unclear risk objectives indicate immature risk management"
    affected_coverages: ["cyber", "tech_eo"]
    risk_weight: 0.4
    justification: "Companies without formal risk assessment are 2.1x more likely to suffer material incidents per Ponemon Institute 2024 study."

  CC5.1:
    category: "Control Activities"
    definition: "The entity selects and develops control activities that contribute to mitigation of risks"
    risk_implication: "Inadequate controls increase all risk categories"
    affected_coverages: ["cyber", "tech_eo", "gl"]
    risk_weight: 0.5
    justification: "Baseline control activities failure affects all lines. Mid-weight because specific control failures (CC6/CC7) are scored separately."

  CC6.1:
    category: "Logical and Physical Access Controls"
    definition: "The entity implements logical access security software, infrastructure, and architectures over protected information assets"
    risk_implication: "Access control weakness is the #1 cyber insurance risk factor"
    affected_coverages: ["cyber"]
    risk_weight: 0.9
    justification: "Access control failures are the #1 root cause in data breaches per Verizon DBIR 2025. 61% of breaches involve compromised credentials. Highest weight in access control category."

  CC6.2:
    category: "Logical and Physical Access Controls"
    definition: "Prior to issuing system credentials, the entity registers and authorizes new internal and external users"
    risk_implication: "Weak user provisioning increases unauthorized access risk"
    affected_coverages: ["cyber"]
    risk_weight: 0.7
    justification: "Improper provisioning is involved in 29% of insider threat incidents per Ponemon Cost of Insider Threats 2024. High weight due to direct breach correlation."

  CC6.3:
    category: "Logical and Physical Access Controls"
    definition: "The entity authorizes, modifies, or removes access based on job function and role"
    risk_implication: "Lack of role-based access indicates flat permission model"
    affected_coverages: ["cyber"]
    risk_weight: 0.6
    justification: "Excessive permissions contribute to 40% of cloud security incidents per Unit 42 Cloud Threat Report. Mid-high weight."

  CC6.6:
    category: "Logical and Physical Access Controls"
    definition: "The entity implements logical access security measures to protect against threats from outside system boundaries"
    risk_implication: "Weak perimeter security -- firewall, WAF, DDoS protection gaps"
    affected_coverages: ["cyber"]
    risk_weight: 0.8
    justification: "External attacks account for 83% of breaches per Verizon DBIR 2025. Strong perimeter controls are table stakes for cyber insurability."

  CC6.8:
    category: "Logical and Physical Access Controls"
    definition: "The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software"
    risk_implication: "No malware protection increases breach probability"
    affected_coverages: ["cyber"]
    risk_weight: 0.7
    justification: "Malware/ransomware is the attack vector in 24% of breaches per Verizon DBIR 2025, with average cost of $4.91M per IBM CODB 2024."

  CC7.1:
    category: "System Operations"
    definition: "To meet its objectives, the entity uses detection and monitoring procedures to identify changes to configurations that result in new vulnerabilities"
    risk_implication: "No vulnerability management program"
    affected_coverages: ["cyber", "tech_eo"]
    risk_weight: 0.7
    justification: "Unpatched vulnerabilities are exploited in 32% of breaches per Mandiant M-Trends 2025. Essential for reducing attack surface."

  CC7.2:
    category: "System Operations"
    definition: "The entity monitors system components and the operation of those components for anomalies indicative of malicious acts, natural disasters, and errors"
    risk_implication: "No intrusion detection or SIEM -- cannot detect breaches"
    affected_coverages: ["cyber"]
    risk_weight: 0.8
    justification: "Mean time to detect breaches without monitoring is 277 days vs 150 days with monitoring per IBM CODB 2024. $1.2M average cost savings with early detection."

  CC7.3:
    category: "System Operations"
    definition: "The entity evaluates security events to determine whether they could or have resulted in a failure to meet objectives"
    risk_implication: "No incident triage process -- breaches may go undetected"
    affected_coverages: ["cyber"]
    risk_weight: 0.7
    justification: "Triage failures extend dwell time, increasing average breach cost by 23% per IBM CODB 2024."

  CC7.4:
    category: "System Operations"
    definition: "The entity responds to identified security incidents by executing a defined incident response program"
    risk_implication: "No incident response plan -- critical for cyber insurance"
    affected_coverages: ["cyber", "tech_eo"]
    risk_weight: 0.9
    justification: "Companies with tested IR plans save $2.66M per breach per IBM CODB 2024. IR plan is the #1 factor cyber insurers evaluate. Maximum weight alongside CC6.1."

  CC8.1:
    category: "Change Management"
    definition: "The entity authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures"
    risk_implication: "Poor change management increases production incidents"
    affected_coverages: ["tech_eo"]
    risk_weight: 0.5
    justification: "Change management failures cause 60% of outages per Gartner, but typically covered by tech E&O rather than cyber. Moderate weight."

  CC9.1:
    category: "Risk Mitigation"
    definition: "The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions"
    risk_implication: "No business continuity planning"
    affected_coverages: ["cyber", "tech_eo", "gl"]
    risk_weight: 0.6
    justification: "BCP gaps increase average downtime cost by $12,900/minute for enterprise SaaS per Atlassian 2024 Incident Management Report."

audit_finding_types:
  exception:
    definition: "A control that was tested and did not operate effectively during the audit period"
    severity: "high"
    risk_impact: "Direct premium increase on affected coverages"
    auto_bind_eligible: false

  qualified_opinion:
    definition: "Auditor found material issues -- the system does not meet one or more trust services criteria"
    severity: "critical"
    risk_impact: "May trigger decline or mandatory senior underwriter review"
    auto_bind_eligible: false

  unqualified_opinion:
    definition: "Clean audit -- system meets all stated trust services criteria"
    severity: "none"
    risk_impact: "Positive signal -- reduces cyber and tech E&O premiums"
    auto_bind_eligible: true

  material_weakness:
    definition: "A deficiency so severe that there is a reasonable possibility of material misstatement not being prevented or detected"
    severity: "critical"
    risk_impact: "Blocks auto-bind. Requires senior underwriter and possibly reinsurance review."
    auto_bind_eligible: false

  compensating_control:
    definition: "An alternative control that partially mitigates a failed primary control"
    severity: "medium"
    risk_impact: "Reduces but does not eliminate the risk. Adjusts premium by 50% of original impact."
    auto_bind_eligible: true

security_signals:
  mfa:
    positive_indicators: ["multi-factor authentication", "MFA required", "two-factor", "2FA enforced", "MFA enabled for all users"]
    negative_indicators: ["single-factor", "MFA not required", "password-only", "MFA optional"]
    risk_field: "mfa_enforced"
    risk_impact_if_absent: 15
    affected_coverages: ["cyber"]
    justification: "MFA blocks 99.9% of automated attacks per Microsoft Security Blog 2024. Absence is the strongest single predictor of credential-based breach."

  encryption_at_rest:
    positive_indicators: ["AES-256", "encrypted at rest", "disk encryption", "TDE enabled", "encrypted storage"]
    negative_indicators: ["unencrypted", "plaintext storage", "no encryption at rest"]
    risk_field: "encryption_at_rest"
    risk_impact_if_absent: 20
    affected_coverages: ["cyber"]
    justification: "Unencrypted data breaches cost $4.88M average vs $3.61M for encrypted per IBM CODB 2024. +20 points reflects 35% higher claim severity."

  encryption_in_transit:
    positive_indicators: ["TLS 1.2", "TLS 1.3", "HTTPS enforced", "encrypted in transit", "SSL"]
    negative_indicators: ["unencrypted connections", "HTTP allowed", "no transport encryption"]
    risk_field: "encryption_in_transit"
    risk_impact_if_absent: 15
    affected_coverages: ["cyber"]
    justification: "Transport encryption is baseline expectation. Absence signals severe security immaturity. +15 is lower than at-rest because MITM attacks are less common than storage breaches."

  incident_response:
    positive_indicators: ["incident response plan", "IRP", "breach notification procedure", "security incident playbook", "CSIRT"]
    negative_indicators: ["no formal incident response", "ad hoc incident handling"]
    risk_field: "has_incident_response"
    risk_impact_if_absent: 10
    affected_coverages: ["cyber", "tech_eo"]
    justification: "Tested IR plans reduce breach cost by $2.66M per IBM CODB 2024. +10 points because IR plan absence is partially captured by CC7.4 weight."

  penetration_testing:
    positive_indicators: ["annual penetration test", "third-party pen test", "external vulnerability assessment"]
    negative_indicators: ["no penetration testing", "testing not performed"]
    risk_field: "has_pen_testing"
    risk_impact_if_absent: 10
    affected_coverages: ["cyber"]
    justification: "Regular pen testing reduces breach probability by 50% per SANS Institute. +10 reflects moderate impact (many vulns found through other means)."

  backup_recovery:
    positive_indicators: ["regular backups", "disaster recovery plan", "RTO defined", "RPO defined", "backup testing"]
    negative_indicators: ["no backup procedures", "backups not tested"]
    risk_field: "has_backup_recovery"
    risk_impact_if_absent: 10
    affected_coverages: ["cyber", "tech_eo"]
    justification: "Backup failures turn ransomware attacks from nuisance to catastrophe. 73% of ransomware victims without backups pay ransom per Sophos 2024."

  access_reviews:
    positive_indicators: ["quarterly access review", "periodic access recertification", "access audit"]
    negative_indicators: ["no access reviews", "access not regularly reviewed"]
    risk_field: "has_access_reviews"
    risk_impact_if_absent: 10
    affected_coverages: ["cyber"]
    justification: "Stale access accounts are exploited in 34% of insider threats per Verizon DBIR 2025. Regular reviews are a core cyber insurance requirement."

# ═══════════════════════════════════════════════════════════════════════
# Risk weight justifications for underwriting rules (#2)
# These are referenced by rules_engine and can be looked up by rule ID.
# ═══════════════════════════════════════════════════════════════════════

rule_justifications:
  pii_no_soc2:
    risk_points: 20
    justification: "Companies without SOC-2 are 3x more likely to experience data breach claims per Coalition Cyber Claims Report 2024. +20 reflects material increase in breach probability for PII handlers."

  pii_no_mfa:
    risk_points: 15
    justification: "MFA absence + PII handling is the highest-risk combination. 80% of hacking-related breaches use stolen credentials per Verizon DBIR 2025."

  pii_no_encryption:
    risk_points: 15
    justification: "Unencrypted PII breach costs average 35% more in regulatory fines and notification costs per IBM CODB 2024."

  payments_no_soc2:
    risk_points: 25
    justification: "Payment card breaches have average remediation cost of $150 per exposed record per IBM CODB 2024. Without SOC-2, payment handlers have 4x higher claim frequency per Coalition."

  payments_with_soc2:
    risk_points: 8
    justification: "SOC-2 reduces but does not eliminate payment risk. PCI-DSS fines of $5K-$100K/month still apply. +8 reflects residual risk."

  ai_product:
    risk_points: 12
    justification: "AI product liability claims are emerging rapidly. 67% of enterprise AI deployments face legal exposure per Gartner 2024. +12 reflects growing but uncertain liability."

  stage_pre_seed:
    risk_points: 15
    justification: "Pre-seed companies have 90% failure rate within 3 years. Limited operational history makes risk assessment highly uncertain."

  stage_seed:
    risk_points: 10
    justification: "Seed companies have 70-80% failure rate. Some traction reduces uncertainty vs pre-seed."

  soc2_qualified_opinion:
    risk_points: 20
    justification: "Qualified opinions indicate material control failures. Coalition data shows 5x higher breach claim rate for qualified vs unqualified SOC-2 reports."

  soc2_exceptions_moderate:
    risk_points: 8
    justification: "1-2 exceptions are common and often remediable. +8 reflects manageable risk with monitoring."

  soc2_exceptions_high:
    risk_points: 15
    justification: "3+ exceptions indicate systemic control weakness. Correlates with 2.5x higher claim frequency per Hartford Cyber Claims Analysis."

  eng_maturity_low:
    risk_points: 12
    justification: "Low engineering maturity (<0.3) means no CI/CD, no security scanning, no security policy. These orgs deploy vulnerabilities faster than they patch them."

  no_ci_cd:
    risk_points: 8
    justification: "No CI/CD means manual deployments. 60% of outages are caused by change management failures per Gartner. +8 for tech E&O risk."

  low_coverage:
    risk_points: 10
    justification: "Insufficient data (<50% field coverage) prevents accurate risk assessment. +10 as uncertainty premium per actuarial pricing principles."
