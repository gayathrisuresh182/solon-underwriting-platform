services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: solon-postgres
    environment:
      POSTGRES_USER: solon
      POSTGRES_PASSWORD: solon_dev
      POSTGRES_DB: solon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
      - ./db/000_init_temporal_db.sql:/docker-entrypoint-initdb.d/000_init_temporal_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solon"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    container_name: solon-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=solon
      - POSTGRES_PWD=solon_dev
      - POSTGRES_SEEDS=postgres
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    container_name: solon-temporal-ui
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

volumes:
  pgdata:
